name: Trigger LangGraph Workflow

on:
  schedule:
    - cron: '30 0,3,7,12 * * *' # Triggers 4 times a day
  workflow_dispatch: 

jobs:
  run-langgraph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/actions-setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Execute LangGraph Workflow
        run: npx tsx index.ts
        env:
          # Mapping GitHub Secrets securely to process.env variables
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}