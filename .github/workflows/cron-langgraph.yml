name: Trigger LangGraph Workflow

on:
  schedule:
    - cron: '30 1,3,6,9,12,18 * * *' 
  workflow_dispatch: 

jobs:
  run-langgraph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses Node.js 20 LTS
          cache: 'npm'       # Automatically caches your node_modules based on package-lock.json

      - name: Install dependencies
        run: npm ci          # "Clean Install" - enforces exact versions from package-lock.json

      - name: Execute LangGraph Workflow
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        run: npm start